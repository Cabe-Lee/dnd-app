<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dice Roller</title>
        <script type="module" src="../scripts/dice-roller.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/main.css">
        <link rel="stylesheet" href="../styles/dropdown.css" />
    </head>
    <body>
        <!-- Fix dice num -->
        <h1>Dice Roller</h1>
        <div id="dice-roller">
            <input type="number" id="dice-num" placeholder="1"> d <input type="number" id="dice" placeholder="20" autocomplete="off"></input>
            <div id="dice-dropdown" class="dropdown" hidden></div>
            <span> + </span> <input type="number" id="modifier" placeholder="0"></input>

            <p id="result"></p>
            <button id="roll-button" type="button">Roll</button>
            <p style="display:none"> </p>
        </div>
    </body>
</html>
