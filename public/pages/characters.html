                        <line x1="89" y1="26" x2="74" y2="62"/>

                <nav aria-label="Main navigation">

        <main class="container">
            <section class="card">
                <h2 class="card-title">Player Characters</h2>
                <div class="button-row">
                    <a class="tool-btn tool-btn-accent" href="character-creation.html">Create New Character</a>
                    <button id="delete-mode-btn">Delete Characters</button>
                </div>
                <div id="delete-confirmation" style="display: none; margin-top: 10px; background: #2a1a1a; border: 1px solid #c55; border-radius: 8px; padding: 16px; color: #ddd;">
                    <p style="margin: 0 0 12px 0; font-weight: 600; color: #e88;">Are you sure you want to delete <span id="delete-target-name" style="color: #fff;"></span>?</p>
                    <button id="confirm-delete-yes" style="background: #c55; color: #fff; border: none; border-radius: 4px; cursor: pointer; padding: 6px 16px; margin-right: 8px;">Yes</button>
                    <button id="confirm-delete-no" style="background: #444; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; padding: 6px 16px;">No</button>
                </div>
                <div id="character-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px;"></div>
            </section>
