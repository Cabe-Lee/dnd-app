<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="brand">
                <svg viewBox="0 0 100 100" class="d20-emblem" aria-hidden="true">
                    <polygon points="50,4 89,26 89,74 50,96 11,74 11,26" class="d20-outer"/>
                    <polygon points="50,22 74,62 26,62" class="d20-face"/>
                    <line x1="50" y1="4"  x2="50" y2="22"/>
                    <line x1="89" y1="26" x2="74" y2="62"/>
                    <line x1="11" y1="26" x2="26" y2="62"/>
                    <line x1="89" y1="74" x2="74" y2="62"/>
                    <line x1="11" y1="74" x2="26" y2="62"/>
                    <line x1="50" y1="96" x2="74" y2="62"/>
                    <line x1="50" y1="96" x2="26" y2="62"/>
                    <text x="50" y="53" class="d20-num">20</text>
                </svg>
                <div class="brand-text">
                    <p class="eyebrow">Campaign companion</p>
                    <h1>D&amp;D App</h1>
                </div>
            </div>
            <nav aria-label="Main navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="dice-roller.html">Dice Roller</a></li>
                    <li><a href="characters.html">Characters</a></li>
                    <li><a href="monsters.html">Monsters</a></li>
                    <li><a target="_blank" rel="noopener" href="https://dnd5e.wikidot.com/">Rules (2014)</a></li>
                </ul>
            </nav>
            <a href="signup.html" class="tool-btn tool-btn-accent">Sign Up</a>
        </div>
    </header>
    <main class="container">
    <h2 class="card-title">Player Login</h2>
    <div id="form-error"></div>
    <form id="login-form" action="/login" method="POST" novalidate>
        <div style="margin-bottom: 12px;">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <span id="username-error" class="error-message">Username is required.</span>
            <span id="username-success" class="success-message">✓ Valid</span>
        </div>

        <div style="margin-bottom: 16px;">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <span id="password-error" class="error-message">Password is required (min 8 characters).</span>
            <span id="password-success" class="success-message">✓ Valid</span>
        </div>

        <button type="submit">Login</button>
        <button type="button" onclick="window.location.href='signup.html'">Don't have an account? Signup</button>
    </form>
    </main>
    <footer>
        <p>&copy; 2026 D&amp;D App. All rights reserved.</p>
    </footer>

    <script src="../scripts/auth.js"></script>
</body>
</html>
