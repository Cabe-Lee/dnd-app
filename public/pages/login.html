<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Login</title>
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <h1>Player Login</h1>
    <div id="form-error"></div>
    <form id="login-form" action="/login" method="POST" novalidate>
        <div style="margin-bottom: 12px;">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <span id="username-error" class="error-message">Username is required.</span>
            <span id="username-success" class="success-message">✓ Valid</span>
        </div>

        <div style="margin-bottom: 16px;">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <span id="password-error" class="error-message">Password is required (min 8 characters).</span>
            <span id="password-success" class="success-message">✓ Valid</span>
        </div>

        <button type="submit">Login</button>
        <button type="button" onclick="window.location.href='signup.html'">Don't have an account? Signup</button>
    </form>

    <script src="../scripts/auth.js"></script>
</body>
</html>
