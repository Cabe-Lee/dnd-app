<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Sheet</title>
</head>
<body>
    <form id="pc-equipment-form">
                <p>Equipment Creator</p>
                <input type="text" id="equipment-quantity-input" placeholder="Quantity">
                <input type="text" id="equipment-input" placeholder="Equipment">
                <input type="text" id="equipment-description-input" placeholder="Description">
            </form>
            <form id="pc-spells-form">
                <p>Spell Creator</p>
                <input type="text" id="spell-name-input" placeholder="Spell Name">
                <input type="text" id="spell-level-input" placeholder="Spell Level">
                <input type="text" id="spell-school-input" placeholder="Spell School">
                <input type="text" id="spell-casting-time-input" placeholder="Casting Time">
                <input type="text" id="spell-range-input" placeholder="Range">
                <input type="text" id="spell-components-input" placeholder="Components">
                <input type="text" id="spell-duration-input" placeholder="Duration">
                <input type="text" id="spell-description-input" placeholder="Description">
            </form>
</body>
</html>
